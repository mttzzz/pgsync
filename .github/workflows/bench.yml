name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      fixtures:
        description: 'Comma-separated fixtures to benchmark'
        required: false
        default: 'large'
      threads:
        description: 'Worker thread count'
        required: false
        default: '0'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Run selected benchmarks
        env:
          PGSYNC_BENCH_FIXTURES: ${{ inputs.fixtures }}
          PGSYNC_BENCH_THREADS: ${{ inputs.threads }}
          PGSYNC_BENCH_OUT: benchmarks/results/local
        run: go test -bench=. -benchmem -run=^$ ./benchmarks/...
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: benchmarks/results/local
