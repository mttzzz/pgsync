name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Test
        run: go test ./...
      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o dist/pgsync-linux-amd64 ./cmd/pgsync
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
