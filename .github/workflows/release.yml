name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Test
        run: go test ./...
      - name: Benchmark smoke
        run: make bench
      - name: Install pgtools fetch dependencies
        run: python -m pip install zstandard
      - name: Prepare embedded pgtools
        run: make pgtools-prepare-release
      - name: Package release artifacts
        run: make package VERSION=${GITHUB_REF_NAME}
      - name: Generate checksums
        run: make checksums
      - name: Verify artifact set
        run: |
          test -f dist/pgsync-windows-amd64.zip
          test -f dist/pgsync-darwin-arm64.tar.gz
          test -f dist/pgsync-darwin-amd64.tar.gz
          test -f dist/pgsync-linux-amd64.tar.gz
          test -f dist/checksums.txt
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file CHANGELOG.md
